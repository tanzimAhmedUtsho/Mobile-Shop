<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Utsho Mobile & Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #050505;
        color: #ffffff;
        font-family: "Inter", sans-serif;
      }
      .glass-nav {
        background: rgba(5, 5, 5, 0.8);
        backdrop-filter: blur(15px);
        border-bottom: 1px solid #1a1a1a;
      }
      .promo-banner {
        background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
        border-radius: 2rem;
        overflow: hidden;
        position: relative;
      }
      .discount-badge {
        background: #ef4444;
        color: white;
        padding: 4px 10px;
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: bold;
      }
      .brand-card {
        background: #111111;
        border: 1px solid #1f1f1f;
        border-radius: 1.5rem;
        transition: all 0.3s ease;
      }
      .brand-card:hover {
        border-color: #3b82f6;
        transform: scale(1.02);
      }
    </style>
  </head>
  <body>
    <nav
      class="sticky top-0 z-50 glass-nav py-4 px-6 md:px-20 flex justify-between items-center"
    >
      <h1 class="text-xl font-bold italic">
        Utsho <span class="text-blue-500">Mobile</span>
      </h1>
      <div
        class="hidden md:flex space-x-8 text-sm uppercase tracking-widest text-gray-400"
      >
        <a href="index.html" class="hover:text-white transition">Home</a>
        <a href="#shop" class="text-blue-500">Shop</a>
        <a href="reparing.html" class="hover:text-white transition"
          >Repairing</a
        >
      </div>
      <div class="flex items-center space-x-5">
        <i class="fas fa-search"></i>
        <div
          onclick="window.location.href = 'logIn.html'"
          class="bg-blue-600 px-4 py-2 rounded-full text-xs font-bold cursor-pointer"
        >
          Login
        </div>
      </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-10">
      <div
        class="promo-banner p-10 md:p-16 flex flex-col md:flex-row items-center justify-between shadow-2xl"
      >
        <div class="z-10 text-center md:text-left">
          <span
            class="bg-white/20 text-white px-4 py-1 rounded-full text-xs font-bold mb-4 inline-block"
            >Flash Sale is Live!</span
          >
          <h2 class="text-4xl md:text-6xl font-black mb-4">
            iPhone 15 Pro <br /><span class="text-blue-200">Titanium</span>
          </h2>
          <p class="text-blue-100 mb-8 max-w-sm">
            এখনই কিনুন এবং জিতে নিন আকর্ষণীয় ক্যাশব্যাক অফার। স্টক সীমিত!
          </p>
          <button
            class="bg-white text-blue-700 px-8 py-4 rounded-2xl font-black hover:bg-gray-100 transition shadow-xl"
          >
            Grab Deal <i class="fas fa-arrow-right ml-2"></i>
          </button>
        </div>
        <img
          src="https://images.unsplash.com/photo-1696446701796-da61225697cc?auto=format&fit=crop&q=80&w=500"
          class="w-64 md:w-80 mt-10 md:mt-0 drop-shadow-2xl rotate-6"
        />
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
      <div class="flex space-x-4 mb-12 overflow-x-auto pb-4 no-scrollbar">
        <button
          onclick="filterBrand('All')"
          class="brand-btn bg-blue-600 text-white px-6 py-2 rounded-full whitespace-nowrap"
        >
          All Phones
        </button>
        <button
          onclick="filterBrand('Apple')"
          class="brand-btn bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap"
        >
          Apple
        </button>
        <button
          onclick="filterBrand('Samsung')"
          class="brand-btn bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap"
        >
          Samsung
        </button>
        <button
          onclick="filterBrand('Realme')"
          class="brand-btn bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap"
        >
          Realme
        </button>
        <button
          onclick="filterBrand('Xiaomi')"
          class="brand-btn bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap"
        >
          Xiaomi
        </button>
        <button
          onclick="filterBrand('Google')"
          class="brand-btn bg-white/5 border border-white/10 px-6 py-2 rounded-full whitespace-nowrap"
        >
          Google Pixel
        </button>
      </div>

      <div
        id="shopGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"
      ></div>
    </main>

    <footer class="text-center py-20 border-t border-gray-900 mt-20">
      <p class="text-gray-500 text-sm">
        Owner: <span class="text-white">Tanzim Ahmed Utsho</span> | Established:
        2024
      </p>
    </footer>

    <script src="shop.js"></script>
  </body>
</html>
